name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: claude-code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment: AGENT
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Additional review rules:
            - Prioritize correctness and behavior regressions over style suggestions.
            - Flag risky assumptions, edge cases, and missing input validation.
            - Call out security concerns (auth, data exposure, injection, secrets handling).
            - Check for performance risks when data volume or loops are involved.
            - Identify missing tests and suggest concrete test cases.
            - Keep feedback actionable with clear remediation guidance.

      - name: Render Claude review output summary
        if: always()
        shell: bash
        run: |
          if [[ ! -f claude-execution-output.json ]]; then
            {
              echo "## Claude Code Review Output"
              echo ""
              echo "- `claude-execution-output.json` not found in workspace."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          jq . claude-execution-output.json > claude-execution-output.pretty.json

          {
            echo "## Claude Code Review Output"
            echo ""
            echo "### Top-level keys"
            jq -r 'keys[] | "- `\(. )`"' claude-execution-output.json
            echo ""
            echo "### Preview (first 120 lines)"
            echo '```json'
            jq -r '.' claude-execution-output.json | head -n 120
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Claude review output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-output-${{ github.run_id }}
          path: |
            claude-execution-output.json
            claude-execution-output.pretty.json
          if-no-files-found: ignore
